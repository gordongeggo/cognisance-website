<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video-Preview — Video 2 + Naht 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #030308; overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Video 2 — der Flug (füllt den Schirm) */
        #v2 {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; background: #030308; z-index: 1;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #v2.on { opacity: 1; }

        /* Startzustand (später: Video 1 + Klick-und-Halte-Ritual) */
        #start {
            position: fixed; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #080815 0%, #010103 100%);
            transition: opacity 0.8s ease;
        }
        #start.hidden { opacity: 0; pointer-events: none; }
        #start .ring {
            width: 150px; height: 150px; border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.5);
            display: flex; align-items: center; justify-content: center;
            letter-spacing: 5px; font-weight: 200; font-size: 0.75rem; color: #d4af37;
            text-indent: 5px; cursor: pointer;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #start .ring:hover { border-color: #d4af37; box-shadow: 0 0 45px rgba(212, 175, 55, 0.35); }
        #start .note {
            margin-top: 26px; font-size: 0.72rem; letter-spacing: 2px; line-height: 1.7;
            color: rgba(255, 255, 255, 0.35); text-align: center; max-width: 80%;
        }

        /* Naht 2: Schleier, der auf die Portalfarbe #080815 blendet (nicht reines Schwarz) */
        #veil { position: fixed; inset: 0; z-index: 8; background: #080815; opacity: 0; pointer-events: none; }

        /* Portal-Platzhalter (hier kommt später das echte Menü) */
        #portal {
            position: fixed; inset: 0; z-index: 9;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #080815 0%, #010103 100%);
            opacity: 0; visibility: hidden; transition: opacity 1.3s ease;
        }
        #portal.on { opacity: 1; visibility: visible; }
        #portal h2 {
            font-weight: 100; letter-spacing: 10px; text-transform: uppercase;
            color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 25px rgba(177, 159, 251, 0.3);
            margin-bottom: 44px; font-size: clamp(1rem, 4vw, 1.6rem); text-align: center;
        }
        .pg { display: grid; grid-template-columns: repeat(2, auto); gap: clamp(24px, 6vw, 60px); justify-items: center; }
        .orb {
            width: clamp(84px, 20vw, 120px); height: clamp(84px, 20vw, 120px); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d4af37; font-weight: 100; font-size: 1.7rem;
            border: 1px solid rgba(212, 175, 55, 0.35);
            background: radial-gradient(circle at 32% 28%, rgba(177, 159, 251, 0.28), rgba(4, 4, 20, 0.65) 72%);
        }
        .plabel { margin-top: 54px; font-size: 0.68rem; letter-spacing: 3px; color: rgba(255, 255, 255, 0.3); text-align: center; }
    </style>
</head>
<body>
    <!-- Video 2 — der Flug (Kling-Netz), spielt einmal -->
    <video id="v2" src="netz_kling_v1.mp4" playsinline preload="auto"></video>

    <!-- Vorläufiger Start (ersetzt später Video 1 + Klick-und-Halte) -->
    <div id="start">
        <div class="ring" id="go">FLUG&nbsp;STARTEN</div>
        <div class="note">
            Test-Auslöser (später: Video 1 als Schleife + Klick-und-Halte-Ritual).<br>
            Video 2 läuft, ab Sekunde 9 dunkelt der Code auf <b style="color:#8aa">#080815</b> ab → Portal.
        </div>
    </div>

    <!-- Naht-2-Schleier -->
    <div id="veil"></div>

    <!-- Portal-Platzhalter -->
    <div id="portal">
        <h2>Vier Tore der Erkenntnis</h2>
        <div class="pg">
            <div class="orb">I</div><div class="orb">II</div><div class="orb">III</div><div class="orb">IV</div>
        </div>
        <div class="plabel">(Portal-Platzhalter — hier kommt später das echte Menü)</div>
    </div>

    <script>
        const v2     = document.getElementById('v2');
        const start  = document.getElementById('start');
        const veil   = document.getElementById('veil');
        const portal = document.getElementById('portal');
        const go     = document.getElementById('go');

        const DARK_START = 9.0;   // Sekunde, ab der abgedunkelt wird (Naht 2)
        let revealed = false;

        // Ab Sekunde 9: Schleier von durchsichtig → voll deckend (#080815),
        // spätestens am Video-Ende voll. Danach Portal aus dem #080815 heraus.
        function onTime() {
            const t = v2.currentTime;
            const d = v2.duration || 10;
            const s = Math.min(DARK_START, d - 1.0);   // Sicherheitsnetz, falls Video kürzer als 10 s
            if (t >= s) veil.style.opacity = Math.min(1, (t - s) / (d - s));
            if (t >= d - 0.05) reveal();
        }
        function reveal() {
            if (revealed) return;
            revealed = true;
            veil.style.opacity = 1;              // sicher voll deckend
            portal.classList.add('on');          // Portal erscheint aus #080815
        }
        v2.addEventListener('timeupdate', onTime);
        v2.addEventListener('ended', reveal);

        go.addEventListener('click', () => {
            start.classList.add('hidden');
            v2.classList.add('on');
            v2.play().catch(e => console.error('Video-Start fehlgeschlagen:', e));
        });
    </script>
</body>
</html>
