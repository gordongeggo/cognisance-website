<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video-Preview — Ritual + Naht 1 + Video 2 + Naht 2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #030308; overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            user-select: none;
        }

        /* Video 1 — die Ambient-Schleife (läuft stumm, endlos, im Hintergrund) */
        #v1 {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 0; background: #05060f;
        }

        /* Video 2 — der Flug */
        #v2 {
            position: fixed; inset: 0; width: 100%; height: 100%;
            object-fit: cover; background: #030308; z-index: 2;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #v2.on { opacity: 1; }

        /* Das Ritual: leuchtender Auslöser in der Mitte (gedrückt halten) */
        #ritual {
            position: fixed; inset: 0; z-index: 5;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }
        #ritual.gone { opacity: 0; pointer-events: none; }
        #trigger {
            position: relative; width: 160px; height: 160px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        #ring { position: absolute; width: 100%; height: 100%; transform: rotate(-90deg); }
        #ring circle { fill: none; stroke-width: 2; }
        #ring .bg { stroke: rgba(212,175,55,0.12); }
        #ring .prog {
            stroke: #d4af37; stroke-dasharray: 440; stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.08s linear; filter: drop-shadow(0 0 6px rgba(212,175,55,0.5));
        }
        #label {
            font-size: 0.85rem; font-weight: 300; letter-spacing: 8px; text-indent: 8px;
            color: #d4af37; text-shadow: 0 0 12px rgba(212,175,55,0.4);
        }
        /* sanftes Pulsieren, das zum Berühren einlädt */
        #trigger { animation: breathe 3.2s ease-in-out infinite; }
        @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        #trigger.charging { animation: none; }
        #hint {
            margin-top: 30px; font-size: 0.72rem; letter-spacing: 4px; text-transform: uppercase;
            color: rgba(255,255,255,0.35); transition: opacity 0.4s ease;
        }
        #hint.hide { opacity: 0; }

        /* Naht 1: heller Lichtblitz beim Umschalten Video 1 -> Video 2 */
        #flash {
            position: fixed; inset: 0; z-index: 7; pointer-events: none; opacity: 0;
            background: radial-gradient(circle at center,
                        rgba(255,246,220,0.95) 0%, rgba(212,175,55,0.5) 22%,
                        rgba(177,159,251,0.18) 45%, rgba(3,3,8,0) 68%);
            transition: opacity 0.5s ease;
        }
        #flash.on { opacity: 1; transition: opacity 0.12s ease; }

        /* Naht 2: Schleier auf Portalfarbe #080815 */
        #veil { position: fixed; inset: 0; z-index: 8; background: #080815; opacity: 0; pointer-events: none; }

        /* Portal-Platzhalter */
        #portal {
            position: fixed; inset: 0; z-index: 9;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #080815 0%, #010103 100%);
            opacity: 0; visibility: hidden; transition: opacity 1.3s ease;
        }
        #portal.on { opacity: 1; visibility: visible; }
        #portal h2 {
            font-weight: 100; letter-spacing: 10px; text-transform: uppercase;
            color: rgba(255,255,255,0.85); text-shadow: 0 0 25px rgba(177,159,251,0.3);
            margin-bottom: 44px; font-size: clamp(1rem, 4vw, 1.6rem); text-align: center;
        }
        .pg { display: grid; grid-template-columns: repeat(2, auto); gap: clamp(24px,6vw,60px); justify-items: center; }
        .orb {
            width: clamp(84px,20vw,120px); height: clamp(84px,20vw,120px); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #d4af37; font-weight: 100; font-size: 1.7rem;
            border: 1px solid rgba(212,175,55,0.35);
            background: radial-gradient(circle at 32% 28%, rgba(177,159,251,0.28), rgba(4,4,20,0.65) 72%);
        }
        .plabel { margin-top: 54px; font-size: 0.68rem; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-align: center; }
    </style>
</head>
<body>
    <!-- Video 1 — Ambient-Schleife (stumm, endlos) -->
    <video id="v1" src="video1.mp4" muted loop autoplay playsinline></video>

    <video id="v2" src="netz_kling_v1.mp4" playsinline preload="auto"></video>

    <!-- Das Ritual: gedrückt halten -->
    <div id="ritual">
        <div id="trigger">
            <svg id="ring" viewBox="0 0 160 160">
                <circle class="bg"   cx="80" cy="80" r="70"></circle>
                <circle class="prog" cx="80" cy="80" r="70"></circle>
            </svg>
            <div id="label">ERKENNE</div>
        </div>
        <div id="hint">gedrückt halten</div>
    </div>

    <div id="flash"></div>
    <div id="veil"></div>

    <div id="portal">
        <h2>Vier Tore der Erkenntnis</h2>
        <div class="pg"><div class="orb">I</div><div class="orb">II</div><div class="orb">III</div><div class="orb">IV</div></div>
        <div class="plabel">(Portal-Platzhalter — hier kommt später das echte Menü)</div>
    </div>

    <script>
        const v2      = document.getElementById('v2');
        const ritual  = document.getElementById('ritual');
        const trigger = document.getElementById('trigger');
        const prog    = document.querySelector('#ring .prog');
        const hint    = document.getElementById('hint');
        const flash   = document.getElementById('flash');
        const veil    = document.getElementById('veil');
        const portal  = document.getElementById('portal');

        // ---- Klick-und-Halte-Ritual ----
        const CIRC = 440;                 // Umfang des Rings (2·π·70)
        let charge = 0, holding = false, launched = false;

        function down(e){ if (!launched) { holding = true; hint.classList.add('hide'); trigger.classList.add('charging'); } }
        function up(){ holding = false; if (!launched) trigger.classList.remove('charging'); }
        window.addEventListener('mousedown', down);
        window.addEventListener('mouseup', up);
        window.addEventListener('touchstart', down, { passive: true });
        window.addEventListener('touchend', up);

        function ritualLoop(){
            if (!launched){
                charge += holding ? 0.012 : -0.02;      // laden beim Halten, sonst zurück
                charge = Math.max(0, Math.min(1, charge));
                prog.style.strokeDashoffset = CIRC * (1 - charge);
                if (charge >= 1) launch();
            }
            requestAnimationFrame(ritualLoop);
        }
        requestAnimationFrame(ritualLoop);

        // ---- Naht 1: Lichtblitz -> Video 2 ----
        function launch(){
            if (launched) return;
            launched = true;
            flash.classList.add('on');                  // heller Blitz überstrahlt den Schnitt
            ritual.classList.add('gone');
            v2.classList.add('on');
            v2.play().catch(err => console.error('Video-Start:', err));
            setTimeout(() => flash.classList.remove('on'), 450);
        }

        // ---- Naht 2: ab Sek. 9 auf #080815 abdunkeln -> Portal ----
        const DARK_START = 9.0;
        let revealed = false;
        v2.addEventListener('timeupdate', () => {
            const t = v2.currentTime, d = v2.duration || 10;
            const s = Math.min(DARK_START, d - 1.0);
            if (t >= s) veil.style.opacity = Math.min(1, (t - s) / (d - s));
            if (t >= d - 0.05) reveal();
        });
        v2.addEventListener('ended', reveal);
        function reveal(){
            if (revealed) return;
            revealed = true;
            veil.style.opacity = 1;
            portal.classList.add('on');
        }
    </script>
</body>
</html>
